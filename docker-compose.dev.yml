version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: clawhost
      POSTGRES_PASSWORD: clawhost
      POSTGRES_DB: nestai-db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
